<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body class="bg-gray-100 p-6">
    <div class="container mx-auto">
        <h1 class="text-3xl font-bold mb-6">Chat Assistant</h1>

        <div id="chat-window">
            <div id="chat-box" class="border border-gray-300 p-4 rounded-md mb-4 h-96 overflow-y-auto bg-white"></div>
            <div class="flex items-center">
                <textarea id="message-input"
                    class="flex-grow border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm mr-2 p-2"
                    placeholder="Type your message"></textarea>
                <button id="send-button"
                    class="px-4 py-2 bg-green-600 text-white rounded-md shadow-sm">Send</button>
            </div>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const messageInput = document.getElementById('message-input');
        const sendButton = document.getElementById('send-button');

        sendButton.addEventListener('click', async () => {
            const message = messageInput.value.trim();
            if (message) {
                appendMessage('🗣️', message);
                messageInput.value = '';
                await sendMessage(message);
                messageInput.focus();
            }
        });

        function appendMessage(sender, message) {
            const messageElement = document.createElement('div');
            messageElement.classList.add('mb-2');
            messageElement.innerHTML = `<strong>${sender}:</strong> <span class="msg">${message}</span>`;
            chatBox.appendChild(messageElement);
            chatBox.scrollTop = chatBox.scrollHeight;
            return messageElement.querySelector('.msg');
        }

        async function sendMessage(question) {
    const payload = {
        session_id: "my-session-id",                   
        flow_keyword: "",                       
        question: question,                             
        thread_id: "thread-id",                         
        json_extractor_thread_id: "extractor-id",       
        is_user_registered: true                        
    };

    try {
        const response = await fetch('/chats/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let done = false;
        let msgBox = appendMessage('🤖', '');
        let fullResponse = '';

        while (!done) {
            const { value, done: doneReading } = await reader.read();
            done = doneReading;
            const chunkValue = decoder.decode(value);
            fullResponse += chunkValue;
            msgBox.innerHTML = marked.parse(fullResponse);
        }

    } catch (err) {
        console.error('Streaming error:', err);
        appendMessage('🤖', " Une erreur est survenue.");
    }
}
    </script>
</body>

</html>
